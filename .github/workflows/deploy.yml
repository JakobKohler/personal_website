name: Deploy Website

on:
  workflow_run:
    workflows: ["Build Check"]
    types:
      - completed
    branches:
      - master
jobs:
  deploy:
    runs-on: self-hosted
    
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js v26.4.0
        uses: actions/setup-node@v7
        with:
          node-version: '26.4.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build

      - name: Deploy to Nginx Directory
        run: |
          cp -r build/* /var/www/schasch.xyz/